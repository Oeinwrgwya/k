<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ball Battle</title>
<style>
  :root {
    --bg: #0e0e14; --panel: #16161f; --border: #2c2c40;
    --gold: #c9a227; --red: #e63946; --blue: #4cc9f0;
    --text: #ddddf0; --dim: #606078;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .screen {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .25s;
  }
  .screen.hidden { opacity:0; pointer-events:none; }

  /* MENU */
  #menu-screen { flex-direction: column; gap: 28px; }
  .pick-label { text-align:center; font-size:13px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; }
  .weapon-grid { display:flex; gap:20px; justify-content:center; }
  .weapon-card {
    width:120px; background:var(--panel); border:2px solid var(--border);
    border-radius:10px; padding:22px 14px 18px; cursor:pointer;
    text-align:center; transition:border-color .15s,background .15s;
    position:relative; user-select:none;
  }
  .weapon-card:hover { border-color:#555570; }
  .weapon-card.selected { border-color:var(--gold); background:#1b1708; }
  .weapon-icon { font-size:40px; display:block; margin-bottom:8px; }
  .weapon-name { font-size:13px; color:var(--dim); letter-spacing:1px; }
  .weapon-card.selected .weapon-name { color:var(--gold); }
  .weapon-badge {
    position:absolute; top:7px; right:7px; width:18px; height:18px;
    background:var(--gold); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:10px; color:#000; font-weight:700; opacity:0; transition:opacity .15s;
  }
  .weapon-card.selected .weapon-badge { opacity:1; }
  .btn-fight {
    font-size:14px; letter-spacing:3px; padding:12px 52px;
    background:var(--gold); border:none; border-radius:7px;
    color:#1a0f00; cursor:pointer; font-weight:600;
    transition:opacity .2s,transform .15s; opacity:0; pointer-events:none; text-transform:uppercase;
  }
  .btn-fight.visible { opacity:1; pointer-events:all; }
  .btn-fight:hover { transform:scale(1.04); }

  /* ARENA */
  #arena-screen { flex-direction:column; gap:0; align-items:center; }
  #arena-canvas { display:block; }
  .hp-row { width:900px; display:flex; justify-content:space-between; align-items:center; padding:8px 4px 6px; }
  .hp-block { display:flex; flex-direction:column; gap:4px; }
  .hp-block.right { align-items:flex-end; }
  .hp-label { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--dim); }
  .hp-bar-wrap { width:180px; height:8px; background:#1a1a28; border-radius:4px; overflow:hidden; border:1px solid var(--border); }
  .hp-bar { height:100%; border-radius:4px; transition:width .08s; }
  #hp-bar-player { background:var(--blue); }
  #hp-bar-enemy  { background:var(--red); }

  /* RESULT */
  #result-screen { flex-direction:column; gap:20px; align-items:center; }
  .result-title { font-size:clamp(28px,5vw,52px); font-weight:700; letter-spacing:3px; text-align:center; }
  .result-title.win  { color:var(--gold); }
  .result-title.lose { color:var(--red); }
  .result-title.draw { color:var(--blue); }
  .result-sub { color:var(--dim); font-size:13px; letter-spacing:2px; text-transform:uppercase; }
  .btn-rematch {
    font-size:13px; letter-spacing:2px; padding:11px 44px;
    background:transparent; border:2px solid var(--gold); border-radius:7px;
    color:var(--gold); cursor:pointer; transition:background .15s; text-transform:uppercase;
  }
  .btn-rematch:hover { background:rgba(201,162,39,.1); }
  .btn-menu {
    font-size:12px; letter-spacing:1px; padding:8px 32px;
    background:transparent; border:1px solid var(--border); border-radius:6px;
    color:var(--dim); cursor:pointer; transition:border-color .15s,color .15s;
  }
  .btn-menu:hover { border-color:var(--dim); color:var(--text); }
</style>
</head>
<body>

<!-- MENU -->
<div class="screen" id="menu-screen">
  <div class="pick-label">Choose your weapon</div>
  <div class="weapon-grid">
    <div class="weapon-card" id="card-sword" onclick="selectWeapon('sword')">
      <div class="weapon-badge">✓</div>
      <span class="weapon-icon">⚔️</span>
      <div class="weapon-name">Sword</div>
    </div>
    <div class="weapon-card" id="card-bow" onclick="selectWeapon('bow')">
      <div class="weapon-badge">✓</div>
      <span class="weapon-icon">🏹</span>
      <div class="weapon-name">Bow</div>
    </div>
  </div>
  <button class="btn-fight" id="btn-fight" onclick="startGame()">Fight</button>
</div>

<!-- ARENA -->
<div class="screen hidden" id="arena-screen">
  <div class="hp-row">
    <div class="hp-block">
      <div class="hp-label">You</div>
      <div class="hp-bar-wrap"><div class="hp-bar" id="hp-bar-player" style="width:100%"></div></div>
    </div>
    <div class="hp-block right">
      <div class="hp-label">Enemy</div>
      <div class="hp-bar-wrap"><div class="hp-bar" id="hp-bar-enemy" style="width:100%"></div></div>
    </div>
  </div>
  <div style="position:relative; line-height:0;">
    <canvas id="arena-canvas" width="900" height="600"></canvas>
    <canvas id="sword-canvas" width="900" height="600" style="position:absolute;top:0;left:0;pointer-events:none;"></canvas>
  </div>
</div>

<!-- RESULT -->
<div class="screen hidden" id="result-screen">
  <div class="result-title" id="result-title">Victory!</div>
  <div class="result-sub" id="result-sub">Enemy defeated</div>
  <button class="btn-rematch" onclick="rematch()">Rematch</button>
  <button class="btn-menu" onclick="goMenu()">Main Menu</button>
</div>

<script>
const W=900, H=600, R=22;
const MAX_HP=5;
const SWORD_LEN=68; // 2x longer
const SWORD_W=5;
const ARROW_INTERVAL=2.2;
const WALL_BOUNCE=0.95;
const PUSH_SCALE=180;

// Sword states: 'rest' | 'windup' | 'slash' | 'recover'
// rest angle = behind ball (away from enemy) + slight downward offset
const SWORD_ATTACK_DIST = SWORD_LEN + R + R + 10; // trigger distance

let playerWeapon=null, enemyWeapon=null;
let gameRunning=false, animFrame=null, lastTime=0;
let player, enemy, arrows, arrowTimers, lastHit;

function selectWeapon(w){
  playerWeapon=w;
  document.querySelectorAll('.weapon-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('card-'+w).classList.add('selected');
  document.getElementById('btn-fight').classList.add('visible');
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function makeSword(){
  return {
    state: 'rest',      // rest | slash | recover
    angle: 0,           // current drawn angle (world space)
    restAngle: 0,       // computed each frame: behind ball + slight down
    slashAngle: 0,      // target of slash (toward enemy)
    timer: 0,
    hitDealt: false,
    // durations
    slashDur: 0.13,
    recoverDur: 0.25,
    cooldown: 0,
    dashTimer: 1.0 + Math.random(), // stagger so both don't dash simultaneously
  };
}

function initBalls(){
  enemyWeapon=['sword','bow'][Math.floor(Math.random()*2)];
  const spd=130;
  function rv(){ const a=Math.random()*Math.PI*2; return {vx:Math.cos(a)*spd,vy:Math.sin(a)*spd}; }
  const pv=rv(), ev=rv();

  player={ x:130, y:H/2, vx:pv.vx, vy:pv.vy, r:R, weapon:playerWeapon, color:'#4cc9f0', alive:true, hp:MAX_HP, aimAngle:0, sword:makeSword() };
  enemy ={ x:W-130, y:H/2, vx:ev.vx, vy:ev.vy, r:R, weapon:enemyWeapon,  color:'#e63946', alive:true, hp:MAX_HP, aimAngle:Math.PI, sword:makeSword() };

  arrows=[];
  arrowTimers={player:0,enemy:0};
  lastHit={player:-999,enemy:-999};
  updateHPBars();
}

function updateHPBars(){
  document.getElementById('hp-bar-player').style.width=(player.hp/MAX_HP*100)+'%';
  document.getElementById('hp-bar-enemy').style.width=(enemy.hp/MAX_HP*100)+'%';
}

function startGame(){
  showScreen('arena-screen');
  initBalls();
  gameRunning=true; lastTime=performance.now();
  animFrame=requestAnimationFrame(loop);
}

function loop(ts){
  if(!gameRunning) return;
  const dt=Math.min((ts-lastTime)/1000,.05);
  lastTime=ts;
  update(dt);
  draw();
  animFrame=requestAnimationFrame(loop);
}

// ── angle helpers ──
function angleDiff(a,b){ let d=((b-a+Math.PI*3)%(Math.PI*2))-Math.PI; return d; }
function lerpAngle(a,b,t){ return a+angleDiff(a,b)*t; }

function update(dt){
  moveBall(player,dt);
  moveBall(enemy,dt);

  // ball-ball collision (elastic, equal mass)
  ballCollide(player,enemy);

  // sword logic
  if(player.weapon==='sword') updateSword(player,enemy,dt);
  if(enemy.weapon==='sword')  updateSword(enemy,player,dt);

  // bow aim
  if(player.weapon==='bow') player.aimAngle=Math.atan2(enemy.y-player.y,enemy.x-player.x);
  if(enemy.weapon==='bow')  enemy.aimAngle =Math.atan2(player.y-enemy.y,player.x-enemy.x);

  if(player.weapon==='bow'){
  arrowTimers.player+=dt;
  if(arrowTimers.player>=ARROW_INTERVAL){ arrowTimers.player=0; shootArrow(player,enemy,'player'); }
  if(!arrowTimers.playerTriple) arrowTimers.playerTriple=10;
  arrowTimers.playerTriple-=dt;
  if(arrowTimers.playerTriple<=0){ arrowTimers.playerTriple=10; shootTriple(player,enemy,'player'); }
}
if(enemy.weapon==='bow'){
  arrowTimers.enemy+=dt;
  if(arrowTimers.enemy>=ARROW_INTERVAL){ arrowTimers.enemy=0; shootArrow(enemy,player,'enemy'); }
  if(!arrowTimers.enemyTriple) arrowTimers.enemyTriple=10+Math.random();
  arrowTimers.enemyTriple-=dt;
  if(arrowTimers.enemyTriple<=0){ arrowTimers.enemyTriple=10+Math.random(); shootTriple(enemy,player,'enemy'); }
}

  for(let i=arrows.length-1;i>=0;i--){
    const a=arrows[i];
    a.x+=a.vx*dt; a.y+=a.vy*dt; a.life-=dt;
    if(a.x<0||a.x>W||a.y<0||a.y>H||a.life<=0){arrows.splice(i,1);continue;}
    const tgt=a.owner==='player'?enemy:player;
    if(!tgt.alive) continue;
    const dx=a.x-tgt.x,dy=a.y-tgt.y;
    if(Math.sqrt(dx*dx+dy*dy)<tgt.r+4){
      const sp=Math.sqrt(a.vx*a.vx+a.vy*a.vy);
      tgt.vx+=(a.vx/sp)*PUSH_SCALE;
      tgt.vy+=(a.vy/sp)*PUSH_SCALE;
      arrows.splice(i,1);
      damage(tgt);
    }
  }
}

function moveBall(b,dt){
  b.x+=b.vx*dt; b.y+=b.vy*dt;
  if(b.x<b.r)   { b.x=b.r;   b.vx= Math.abs(b.vx)*WALL_BOUNCE; }
  if(b.x>W-b.r) { b.x=W-b.r; b.vx=-Math.abs(b.vx)*WALL_BOUNCE; }
  if(b.y<b.r)   { b.y=b.r;   b.vy= Math.abs(b.vy)*WALL_BOUNCE; }
  if(b.y>H-b.r) { b.y=H-b.r; b.vy=-Math.abs(b.vy)*WALL_BOUNCE; }
}

function ballCollide(a,b){
  const dx=b.x-a.x, dy=b.y-a.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const minDist=a.r+b.r;
  if(dist>=minDist||dist===0) return;

  // separate
  const nx=dx/dist, ny=dy/dist;
  const overlap=(minDist-dist)/2;
  a.x-=nx*overlap; a.y-=ny*overlap;
  b.x+=nx*overlap; b.y+=ny*overlap;

  // elastic 1D collision along normal
  const dvx=a.vx-b.vx, dvy=a.vy-b.vy;
  const dot=dvx*nx+dvy*ny;
  if(dot<=0) return; // moving apart already
  // equal mass: just swap normal component
  a.vx-=dot*nx; a.vy-=dot*ny;
  b.vx+=dot*nx; b.vy+=dot*ny;
}

// ── SWORD STATE MACHINE ──
function updateSword(att, tgt, dt){
  const sw=att.sword;

  // angle toward enemy
  const toEnemyAngle=Math.atan2(tgt.y-att.y,tgt.x-att.x);
  // rest = opposite direction + 1.3 rad to the side
  const restAngle=toEnemyAngle+Math.PI+0.8;
  sw.restAngle=restAngle;

  const dist=Math.sqrt((tgt.x-att.x)**2+(tgt.y-att.y)**2);

  sw.cooldown=Math.max(0,sw.cooldown-dt);

  if(sw.state==='rest'){
    // smoothly track rest position
    sw.angle=lerpAngle(sw.angle,restAngle,Math.min(1,dt*8));

    // periodic dash toward enemy
    sw.dashTimer=Math.max(0,sw.dashTimer-dt);
    if(sw.dashTimer<=0){
      sw.dashTimer=2.0;
      const nx=(tgt.x-att.x), ny=(tgt.y-att.y);
      const nd=Math.sqrt(nx*nx+ny*ny)||1;
      att.vx+=(nx/nd)*160;
      att.vy+=(ny/nd)*160;
    }

    // trigger attack when close enough and cooldown done
    if(dist<SWORD_ATTACK_DIST && sw.cooldown<=0){
      sw.state='slash';
      sw.timer=0;
      sw.hitDealt=false;
      sw.slashAngle=toEnemyAngle; // slash toward enemy
    }
  }
  else if(sw.state==='slash'){
    sw.timer+=dt;
    const p=Math.min(1,sw.timer/sw.slashDur);
    // swing from rest to slash angle
    sw.angle=lerpAngle(restAngle,sw.slashAngle,easeOut(p));

    // hit detection during slash
    if(!sw.hitDealt) checkSwordBlade(att,tgt,sw.angle,sw);

    if(sw.timer>=sw.slashDur){
      sw.state='recover';
      sw.timer=0;
    }
  }
  else if(sw.state==='recover'){
    sw.timer+=dt;
    const p=Math.min(1,sw.timer/sw.recoverDur);
    sw.angle=lerpAngle(sw.slashAngle,restAngle,easeOut(p));
    if(sw.timer>=sw.recoverDur){
      sw.state='rest';
      sw.cooldown=0.4; // pause before next swing
    }
  }
}

function easeOut(t){ return 1-(1-t)*(1-t); }

function checkSwordBlade(att,tgt,angle,sw){
  const s0=att.r, s1=att.r+SWORD_LEN;
  for(let t=0;t<=1;t+=0.1){
    const d=s0+(s1-s0)*t;
    const bx=att.x+Math.cos(angle)*d, by=att.y+Math.sin(angle)*d;
    const dx=bx-tgt.x, dy=by-tgt.y;
    if(Math.sqrt(dx*dx+dy*dy)<tgt.r+SWORD_W/2){
      const nx=(tgt.x-att.x), ny=(tgt.y-att.y);
      const nd=Math.sqrt(nx*nx+ny*ny)||1;
      tgt.vx+=(nx/nd)*PUSH_SCALE;
      tgt.vy+=(ny/nd)*PUSH_SCALE;
      damage(tgt);
      sw.hitDealt=true;
      break;
    }
  }
}

function damage(b){
  const key=b===player?'player':'enemy';
  const now=performance.now();
  if(now-lastHit[key]<450) return;
  lastHit[key]=now;
  b.hp=Math.max(0,b.hp-1);
  updateHPBars();
  if(b.hp<=0){ b.alive=false; endGame(b===player?'lose':'win'); }
}

function shootArrow(from,to,owner){
  const dx=to.x-from.x,dy=to.y-from.y;
  const d=Math.sqrt(dx*dx+dy*dy)||1;
  const spd=320;
  arrows.push({x:from.x+(dx/d)*(from.r+10),y:from.y+(dy/d)*(from.r+10),vx:(dx/d)*spd,vy:(dy/d)*spd,owner,life:5});
}

  function shootTriple(from,to,owner){
  const dx=to.x-from.x,dy=to.y-from.y;
  const d=Math.sqrt(dx*dx+dy*dy)||1;
  const spd=260;
  [-0.28, 0, 0.28].forEach(offset=>{
    const ang=Math.atan2(dy,dx)+offset;
    arrows.push({
      x:from.x+Math.cos(ang)*(from.r+10),
      y:from.y+Math.sin(ang)*(from.r+10),
      vx:Math.cos(ang)*spd,
      vy:Math.sin(ang)*spd,
      owner,life:5
    });
  });
}

// ── DRAW ──
function draw(){
  const cv=document.getElementById('arena-canvas');
  const ctx=cv.getContext('2d');

  ctx.fillStyle='#0d0d16'; ctx.fillRect(0,0,W,H);

  // grid
  ctx.strokeStyle='rgba(36,36,62,.8)'; ctx.lineWidth=1;
  for(let x=0;x<=W;x+=40){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  for(let y=0;y<=H;y+=40){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
  ctx.strokeStyle='rgba(55,55,90,.9)'; ctx.lineWidth=2;
  ctx.strokeRect(1,1,W-2,H-2);

  // arrows
  arrows.forEach(a=>{
    const ang=Math.atan2(a.vy,a.vx);
    ctx.save(); ctx.translate(a.x,a.y); ctx.rotate(ang);
    const col=a.owner==='player'?'#4cc9f0':'#e63946';
    ctx.strokeStyle=col; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(-12,0); ctx.lineTo(8,0); ctx.stroke();
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(1,-4); ctx.lineTo(1,4); ctx.closePath(); ctx.fill();
    ctx.restore();
  });

  // draw balls (body only, no sword yet)
  drawBallBody(ctx,player);
  drawBallBody(ctx,enemy);

  // draw bows on top of balls
  if(player.weapon==='bow') drawBow(ctx,player);
  if(enemy.weapon==='bow')  drawBow(ctx,enemy);

  // draw swords LAST on overlay canvas — always on top of everything including ball body
  const sc=document.getElementById('sword-canvas');
  const sctx=sc.getContext('2d');
  sctx.clearRect(0,0,W,H);
  if(player.weapon==='sword' && player.alive) drawSword(sctx,player);
  if(enemy.weapon==='sword'  && enemy.alive)  drawSword(sctx,enemy);
}

function drawBallBody(ctx,b){
  if(!b.alive) return;
  // glow
  const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*2.2);
  g.addColorStop(0,b.color+'2a'); g.addColorStop(1,'transparent');
  ctx.beginPath(); ctx.arc(b.x,b.y,b.r*2.2,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  // body
  const bg=ctx.createRadialGradient(b.x-4,b.y-4,1,b.x,b.y,b.r);
  bg.addColorStop(0,'#fff'); bg.addColorStop(.25,b.color); bg.addColorStop(1,b.color+'66');
  ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
  ctx.fillStyle=bg; ctx.fill();
  ctx.strokeStyle=b.color; ctx.lineWidth=2; ctx.stroke();
}

function drawSword(ctx,b){
  const sw=b.sword;
  const angle=sw.angle;
  const isSlashing=(sw.state==='slash'||sw.state==='recover');

  // ── sword body ──
  ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(angle);
  const s=b.r+1;

  // handle
  ctx.strokeStyle='#7a5810'; ctx.lineWidth=5; ctx.lineCap='butt';
  ctx.beginPath(); ctx.moveTo(s,0); ctx.lineTo(s+10,0); ctx.stroke();

  // guard
  ctx.strokeStyle='#c9a227'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(s+10,-9); ctx.lineTo(s+10,9); ctx.stroke();

  // blade
  const bs=s+10, be=s+SWORD_LEN;
  const gr=ctx.createLinearGradient(bs,0,be,0);
  gr.addColorStop(0,'#e8e8ff'); gr.addColorStop(.5,'#b8c0ff'); gr.addColorStop(1,'rgba(160,170,255,0)');
  ctx.strokeStyle=gr; ctx.lineWidth=SWORD_W; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(bs,0); ctx.lineTo(be,0); ctx.stroke();

  // shine
  ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(bs+2,-2); ctx.lineTo(be-4,-1); ctx.stroke();

  ctx.restore();
}

function drawBow(ctx,b){
  ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.aimAngle);
  const d=b.r+14;
  ctx.strokeStyle='#c9a227'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(d,0,16,-Math.PI*.65,Math.PI*.65); ctx.stroke();
  const sy=Math.sin(Math.PI*.65)*16;
  ctx.strokeStyle='#e8e8c0'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(d,-sy); ctx.lineTo(d+4,0); ctx.lineTo(d,sy); ctx.stroke();
  ctx.restore();
}

function endGame(result){
  if(!gameRunning) return;
  gameRunning=false; cancelAnimationFrame(animFrame);
  setTimeout(()=>{
    const t=document.getElementById('result-title');
    const s=document.getElementById('result-sub');
    if(result==='win'){ t.textContent='Victory!'; t.className='result-title win'; s.textContent='Enemy defeated'; }
    else if(result==='lose'){ t.textContent='Defeat'; t.className='result-title lose'; s.textContent='Try again'; }
    else { t.textContent='Draw'; t.className='result-title draw'; s.textContent='Both fell'; }
    showScreen('result-screen');
  },500);
}

function rematch(){
  showScreen('arena-screen');
  initBalls();
  gameRunning=true; lastTime=performance.now();
  animFrame=requestAnimationFrame(loop);
}

function goMenu(){
  showScreen('menu-screen');
  playerWeapon=null;
  document.querySelectorAll('.weapon-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('btn-fight').classList.remove('visible');
}
</script>
</body>
</html>
