<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>echo</title>
    <style>
      body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; }
      canvas { border: 2px solid #555; background: black; }
    </style>
  </head>
  <body>
    <canvas width="900" height="600"></canvas>
    <script>
      const canvas = document.querySelector("canvas");
      const ctx = canvas.getContext("2d");

      let rightPressed = false;
      let leftPressed = false;
      let upPressed = false;
      let downPressed = false;

      const playerSize = 50;
      const startX = canvas.width / 2;
      const startY = canvas.height - 55;

      let playerX = startX;
      let playerY = startY;
      let score = 0;
      let dead = false;
      let shakeFrames = 0;
      const SHAKE_DURATION = 30;

      const squares = [];

      document.addEventListener("keydown", keyDownHandler, false);
      document.addEventListener("keyup", keyUpHandler, false);

      function keyDownHandler(e) {
        if (e.key === "Right" || e.key === "ArrowRight" || e.key === "d" || e.key === "D") rightPressed = true;
        else if (e.key === "Left" || e.key === "ArrowLeft" || e.key === "a" || e.key === "A") leftPressed = true;
        else if (e.key === "Up" || e.key === "ArrowUp" || e.key === "w" || e.key === "W") upPressed = true;
        else if (e.key === "Down" || e.key === "ArrowDown" || e.key === "s" || e.key === "S") downPressed = true;
      }

      function keyUpHandler(e) {
        if (e.key === "Right" || e.key === "ArrowRight" || e.key === "d" || e.key === "D") rightPressed = false;
        else if (e.key === "Left" || e.key === "ArrowLeft" || e.key === "a" || e.key === "A") leftPressed = false;
        else if (e.key === "Up" || e.key === "ArrowUp" || e.key === "w" || e.key === "W") upPressed = false;
        else if (e.key === "Down" || e.key === "ArrowDown" || e.key === "s" || e.key === "S") downPressed = false;
      }

      function spawnSquare(i) {
        return {
          x: Math.random() * (canvas.width - playerSize),
          y: -playerSize - Math.random() * canvas.height,
          size: playerSize,
          speedX: (Math.random() * 2 + 1) * (Math.random() < 0.5 ? 1 : -1),
          speedY: Math.random() * 2 + 1,
        };
      }

      for (let i = 0; i < 5; i++) {
        squares.push(spawnSquare(i));
      }

      function resetPlayer() {
        playerX = startX;
        playerY = startY;
        dead = false;
        shakeFrames = 0;
        rightPressed = false;
        leftPressed = false;
        upPressed = false;
        downPressed = false;
      }

      function drawPlayer(offsetX, offsetY) {
        ctx.beginPath();
        ctx.rect(playerX + offsetX, playerY + offsetY, playerSize, playerSize);
        ctx.fillStyle = dead ? "#ff4444" : "red";
        ctx.fill();
        ctx.closePath();
      }

      function drawSquares() {
        squares.forEach((square) => {
          ctx.beginPath();
          ctx.rect(square.x, square.y, square.size, square.size);
          ctx.fillStyle = "#4af";
          ctx.fill();
          ctx.closePath();

          if (!dead) {
            square.x += square.speedX;
            square.y += square.speedY;

            if (square.x < 0 || square.x + square.size > canvas.width) {
              square.speedX *= -1;
              square.x = Math.max(0, Math.min(square.x, canvas.width - square.size));
            }

            if (square.y > canvas.height) {
              Object.assign(square, spawnSquare());
            }

            // Kolizja
            if (
              !dead &&
              playerX < square.x + square.size &&
              playerX + playerSize > square.x &&
              playerY < square.y + square.size &&
              playerY + playerSize > square.y
            ) {
              dead = true;
              shakeFrames = SHAKE_DURATION;
            }
          }
        });
      }

      function drawScore() {
        ctx.font = "20px Arial";
        ctx.fillStyle = "white";
        ctx.fillText("Wynik: " + score, 20, 30);
      }

      function draw() {
        let shakeX = 0;
        let shakeY = 0;

        if (shakeFrames > 0) {
          shakeFrames--;
          const intensity = Math.floor((shakeFrames / SHAKE_DURATION) * 18);
          shakeX = (Math.random() - 0.5) * 2 * intensity;
          shakeY = (Math.random() - 0.5) * 2 * intensity;

          if (shakeFrames === 0) {
            resetPlayer();
          }
        }

        ctx.save();
        ctx.translate(shakeX, shakeY);

        ctx.clearRect(-20, -20, canvas.width + 40, canvas.height + 40);

        // Czerwone tło przy śmierci
        if (dead) {
          ctx.fillStyle = `rgba(255, 0, 0, ${0.15 * (shakeFrames / SHAKE_DURATION)})`;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        ctx.beginPath();
        ctx.strokeStyle = "#555";
        ctx.strokeRect(0, 0, canvas.width, canvas.height);
        ctx.closePath();

        if (!dead) {
          if (rightPressed) playerX = Math.min(playerX + 5, canvas.width - playerSize);
          if (leftPressed)  playerX = Math.max(playerX - 5, 0);
          if (upPressed)    playerY = Math.max(playerY - 5, 0);
          if (downPressed)  playerY = Math.min(playerY + 5, canvas.height - playerSize);
        }

        drawPlayer(0, 0);
        drawSquares();
        drawScore();

        ctx.restore();

        requestAnimationFrame(draw);
      }

      draw();
      setInterval(() => { if (!dead) score++; }, 1000);
    </script>
  </body>
</html>
