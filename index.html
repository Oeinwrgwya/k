<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KULKI WARFARE</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --border: #2a2a3a;
    --gold: #c9a227;
    --gold2: #e8c85a;
    --red: #e63946;
    --blue: #4cc9f0;
    --green: #57cc99;
    --text: #e8e8f0;
    --dim: #666688;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── STARFIELD ── */
  #stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }

  /* ── SCREENS ── */
  .screen {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 10;
    transition: opacity .4s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ── MENU ── */
  #menu-screen {
    flex-direction: column;
    gap: 40px;
    background: radial-gradient(ellipse at 50% 30%, #1a1a2e 0%, #0a0a0f 70%);
  }

  .title {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(28px, 6vw, 64px);
    font-weight: 900;
    text-align: center;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(201,162,39,.4));
    letter-spacing: 4px;
  }
  .subtitle {
    text-align: center;
    font-size: 14px;
    letter-spacing: 6px;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: -30px;
  }

  .weapon-grid {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .weapon-card {
    width: 180px;
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 30px 20px;
    cursor: pointer;
    text-align: center;
    transition: all .25s;
    position: relative;
    overflow: hidden;
  }
  .weapon-card::before {
    content: '';
    position: absolute;
    inset: -2px;
    background: linear-gradient(135deg, var(--gold), transparent, var(--gold));
    border-radius: 12px;
    opacity: 0;
    transition: opacity .25s;
    z-index: -1;
  }
  .weapon-card:hover { transform: translateY(-6px); border-color: var(--gold); }
  .weapon-card:hover::before { opacity: .3; }
  .weapon-card.selected {
    border-color: var(--gold);
    background: #1e1a0e;
    box-shadow: 0 0 30px rgba(201,162,39,.3), inset 0 0 20px rgba(201,162,39,.05);
  }
  .weapon-card.selected::before { opacity: .5; }

  .weapon-icon { font-size: 52px; margin-bottom: 12px; display: block; }
  .weapon-name {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 14px;
    color: var(--gold2);
    letter-spacing: 2px;
  }
  .weapon-desc {
    font-size: 12px;
    color: var(--dim);
    margin-top: 8px;
    line-height: 1.5;
  }
  .weapon-badge {
    position: absolute;
    top: 10px; right: 10px;
    width: 22px; height: 22px;
    background: var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    color: #000;
    font-weight: 900;
    opacity: 0;
    transition: opacity .2s;
  }
  .weapon-card.selected .weapon-badge { opacity: 1; }

  .btn-fight {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 18px;
    letter-spacing: 4px;
    padding: 16px 60px;
    background: linear-gradient(135deg, #a07818, var(--gold), #a07818);
    border: none;
    border-radius: 8px;
    color: #1a0f00;
    cursor: pointer;
    font-weight: 700;
    transition: all .2s;
    box-shadow: 0 4px 20px rgba(201,162,39,.4);
    opacity: 0;
    pointer-events: none;
  }
  .btn-fight.visible { opacity: 1; pointer-events: all; }
  .btn-fight:hover { transform: scale(1.05); box-shadow: 0 6px 30px rgba(201,162,39,.6); }

  /* ── ARENA ── */
  #arena-screen { background: var(--bg); flex-direction: column; gap: 0; }

  #arena-canvas {
    display: block;
    border: 3px solid var(--border);
    border-radius: 4px;
    box-shadow: 0 0 60px rgba(0,0,0,.8), inset 0 0 40px rgba(0,0,0,.5);
  }

  .hud {
    width: 100%;
    max-width: 600px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 4px 4px 0 0;
  }
  .hud-name {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 12px;
    letter-spacing: 2px;
  }
  .hud-name.player { color: var(--blue); }
  .hud-name.enemy  { color: var(--red); }
  .hud-center {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
  }
  .hud-bottom {
    width: 100%;
    max-width: 600px;
    display: flex;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 4px 4px;
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  /* ── COUNTDOWN OVERLAY ── */
  #countdown-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 20;
  }
  #countdown-num {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 120px;
    font-weight: 900;
    color: var(--gold2);
    text-shadow: 0 0 40px var(--gold), 0 0 80px rgba(201,162,39,.4);
    opacity: 0;
    transform: scale(2);
    transition: opacity .15s, transform .5s;
  }
  #countdown-num.show { opacity: 1; transform: scale(1); }

  /* ── RESULT ── */
  #result-screen {
    flex-direction: column;
    gap: 24px;
    background: radial-gradient(ellipse at 50% 40%, #1a1a2e 0%, #0a0a0f 70%);
  }
  .result-title {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(24px, 5vw, 56px);
    text-align: center;
    font-weight: 900;
    letter-spacing: 4px;
  }
  .result-title.win  { color: var(--gold2); text-shadow: 0 0 30px var(--gold); }
  .result-title.lose { color: var(--red);   text-shadow: 0 0 30px var(--red); }
  .result-title.draw { color: var(--blue);  text-shadow: 0 0 30px var(--blue); }
  .result-sub { color: var(--dim); font-size: 16px; letter-spacing: 3px; text-transform: uppercase; }

  .btn-rematch {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 14px;
    letter-spacing: 3px;
    padding: 14px 50px;
    background: transparent;
    border: 2px solid var(--gold);
    border-radius: 8px;
    color: var(--gold2);
    cursor: pointer;
    transition: all .2s;
  }
  .btn-rematch:hover { background: rgba(201,162,39,.15); transform: scale(1.04); }
  .btn-menu {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    letter-spacing: 2px;
    padding: 10px 40px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--dim);
    cursor: pointer;
    transition: all .2s;
  }
  .btn-menu:hover { border-color: var(--dim); color: var(--text); }
</style>
</head>
<body>

<canvas id="stars"></canvas>

<!-- MENU -->
<div class="screen" id="menu-screen">
  <div class="title">KULKI WARFARE</div>
  <div class="subtitle">Wybierz broń i wejdź na arenę</div>
  <div class="weapon-grid">
    <div class="weapon-card" id="card-sword" onclick="selectWeapon('sword')">
      <div class="weapon-badge">✓</div>
      <span class="weapon-icon">⚔️</span>
      <div class="weapon-name">Miecz</div>
      <div class="weapon-desc">Obraca się wokół kulki. Trafienie odpycha wroga.</div>
    </div>
    <div class="weapon-card" id="card-bow" onclick="selectWeapon('bow')">
      <div class="weapon-badge">✓</div>
      <span class="weapon-icon">🏹</span>
      <div class="weapon-name">Łuk</div>
      <div class="weapon-desc">Co sekundę wystrzeliwuje strzałę w kierunku wroga.</div>
    </div>
  </div>
  <button class="btn-fight" id="btn-fight" onclick="startGame()">WALCZ</button>
</div>

<!-- ARENA -->
<div class="screen hidden" id="arena-screen">
  <div class="hud">
    <div class="hud-name player" id="hud-player">TY — ⚔️</div>
    <div class="hud-center">ARENA</div>
    <div class="hud-name enemy" id="hud-enemy">WRÓG — 🏹</div>
  </div>
  <div style="position:relative;">
    <canvas id="arena-canvas" width="600" height="600"></canvas>
    <div id="countdown-overlay">
      <div id="countdown-num">3</div>
    </div>
  </div>
  <div class="hud-bottom">
    <span id="info-player">Kulka gracza</span>
    <span id="info-enemy">Kulka wroga</span>
  </div>
</div>

<!-- RESULT -->
<div class="screen hidden" id="result-screen">
  <div class="result-title" id="result-title">ZWYCIĘSTWO!</div>
  <div class="result-sub" id="result-sub">Wróg pokonany</div>
  <button class="btn-rematch" onclick="rematch()">REWANŻ</button>
  <button class="btn-menu" onclick="goMenu()">Menu główne</button>
</div>

<script>
// ── STARFIELD ──
(function(){
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  c.width = window.innerWidth; c.height = window.innerHeight;
  const stars = Array.from({length:180},()=>({
    x: Math.random()*c.width, y: Math.random()*c.height,
    r: Math.random()*1.2+.2, a: Math.random(), da: (Math.random()-.5)*.005
  }));
  function drawStars(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{
      s.a = Math.max(0.05,Math.min(1,s.a+s.da));
      if(s.a<=.05||s.a>=1) s.da*=-1;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,200,255,${s.a})`; ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  drawStars();
})();

// ── GLOBALS ──
const WEAPONS = ['sword','bow'];
let playerWeapon = null;
let enemyWeapon  = null;
let gameRunning  = false;
let animFrame    = null;
let lastTime     = 0;

// ── MENU ──
function selectWeapon(w){
  playerWeapon = w;
  document.querySelectorAll('.weapon-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('card-'+w).classList.add('selected');
  document.getElementById('btn-fight').classList.add('visible');
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

// ── GAME STATE ──
const W = 600, H = 600;
const RADIUS = 22;
const ARENA_PAD = 30;

let player, enemy, arrows, swordAngle;

function initBalls(){
  enemyWeapon = WEAPONS[Math.floor(Math.random()*WEAPONS.length)];

  const speed = 110; // px/s
  const angP  = Math.random()*Math.PI*2;
  const angE  = Math.random()*Math.PI*2;

  player = {
    x: 130, y: H/2,
    vx: Math.cos(angP)*speed, vy: Math.sin(angP)*speed,
    r: RADIUS, weapon: playerWeapon,
    color: '#4cc9f0', alive: true,
    pushVx: 0, pushVy: 0
  };
  enemy = {
    x: W-130, y: H/2,
    vx: Math.cos(angE)*speed, vy: Math.sin(angE)*speed,
    r: RADIUS, weapon: enemyWeapon,
    color: '#e63946', alive: true,
    pushVx: 0, pushVy: 0
  };
  arrows = [];
  swordAngle = { player: 0, enemy: 0 };

  // HUD
  const wIcon = w => w==='sword'?'⚔️':'🏹';
  document.getElementById('hud-player').textContent = `TY — ${wIcon(playerWeapon)}`;
  document.getElementById('hud-enemy').textContent  = `WRÓG — ${wIcon(enemyWeapon)}`;
  document.getElementById('info-player').textContent = `Kulka: ${playerWeapon==='sword'?'Miecz':'Łuk'}`;
  document.getElementById('info-enemy').textContent  = `Wróg: ${enemyWeapon==='sword'?'Miecz':'Łuk'}`;
}

// ── COUNTDOWN ──
function startGame(){
  showScreen('arena-screen');
  initBalls();
  drawStatic();
  runCountdown(3);
}

function drawStatic(){
  const cv = document.getElementById('arena-canvas');
  const ctx = cv.getContext('2d');
  drawArena(ctx, 0);
}

function runCountdown(n){
  const el = document.getElementById('countdown-num');
  el.textContent = n > 0 ? String(n) : 'START!';
  el.style.color = n > 0 ? '#e8c85a' : '#57cc99';
  el.style.textShadow = n > 0
    ? '0 0 40px #c9a227, 0 0 80px rgba(201,162,39,.4)'
    : '0 0 40px #57cc99, 0 0 80px rgba(87,204,153,.4)';

  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      el.classList.add('show');
      setTimeout(()=>{
        el.classList.remove('show');
        setTimeout(()=>{
          if(n > 0) runCountdown(n-1);
          else {
            document.getElementById('countdown-overlay').style.display='none';
            startLoop();
          }
        }, 300);
      }, n===0 ? 600 : 700);
    });
  });
}

// ── ARROW TIMERS ──
let arrowTimers = {player:0, enemy:0};
const ARROW_INTERVAL = 1.0; // seconds

// ── MAIN LOOP ──
function startLoop(){
  gameRunning = true;
  arrowTimers = {player:0, enemy:0};
  lastTime = performance.now();
  animFrame = requestAnimationFrame(loop);
}

function loop(ts){
  if(!gameRunning) return;
  const dt = Math.min((ts - lastTime)/1000, .05);
  lastTime = ts;
  update(dt);
  const cv = document.getElementById('arena-canvas');
  const ctx = cv.getContext('2d');
  drawArena(ctx, dt);
  animFrame = requestAnimationFrame(loop);
}

function update(dt){
  moveBall(player, dt);
  moveBall(enemy, dt);

  // sword angles
  swordAngle.player += dt * 3.5;
  swordAngle.enemy  += dt * 3.5;

  // sword hit detection
  if(player.weapon==='sword') checkSwordHit(player, enemy, swordAngle.player);
  if(enemy.weapon==='sword')  checkSwordHit(enemy, player, swordAngle.enemy);

  // arrow shooting
  if(player.weapon==='bow'){
    arrowTimers.player += dt;
    if(arrowTimers.player >= ARROW_INTERVAL){
      arrowTimers.player = 0;
      shootArrow(player, enemy, 'player');
    }
  }
  if(enemy.weapon==='bow'){
    arrowTimers.enemy += dt;
    if(arrowTimers.enemy >= ARROW_INTERVAL){
      arrowTimers.enemy = 0;
      shootArrow(enemy, player, 'enemy');
    }
  }

  // move arrows
  for(let i=arrows.length-1; i>=0; i--){
    const a = arrows[i];
    a.x += a.vx*dt; a.y += a.vy*dt;
    a.life -= dt;
    // out of bounds
    if(a.x<0||a.x>W||a.y<0||a.y>H||a.life<=0){ arrows.splice(i,1); continue; }
    // hit target
    const target = a.owner==='player' ? enemy : player;
    const dx=a.x-target.x, dy=a.y-target.y;
    if(Math.sqrt(dx*dx+dy*dy) < target.r+4){
      const spd=Math.sqrt(a.vx*a.vx+a.vy*a.vy);
      target.pushVx += (a.vx/spd)*220;
      target.pushVy += (a.vy/spd)*220;
      arrows.splice(i,1);
      // check kill
      checkOut(target);
    }
  }

  // check if balls left arena
  checkOut(player);
  checkOut(enemy);
}

function moveBall(b, dt){
  // push decay
  b.pushVx *= Math.pow(0.04, dt);
  b.pushVy *= Math.pow(0.04, dt);

  b.x += (b.vx + b.pushVx)*dt;
  b.y += (b.vy + b.pushVy)*dt;

  // bounce walls
  if(b.x - b.r < ARENA_PAD)         { b.x = ARENA_PAD+b.r;      b.vx  = Math.abs(b.vx); }
  if(b.x + b.r > W - ARENA_PAD)     { b.x = W-ARENA_PAD-b.r;    b.vx  = -Math.abs(b.vx); }
  if(b.y - b.r < ARENA_PAD)         { b.y = ARENA_PAD+b.r;       b.vy  = Math.abs(b.vy); }
  if(b.y + b.r > H - ARENA_PAD)     { b.y = H-ARENA_PAD-b.r;     b.vy  = -Math.abs(b.vy); }

  // push bounce walls
  if(b.x - b.r < ARENA_PAD)         b.pushVx = Math.abs(b.pushVx);
  if(b.x + b.r > W - ARENA_PAD)     b.pushVx = -Math.abs(b.pushVx);
  if(b.y - b.r < ARENA_PAD)         b.pushVy = Math.abs(b.pushVy);
  if(b.y + b.r > H - ARENA_PAD)     b.pushVy = -Math.abs(b.pushVy);
}

const SWORD_LEN   = 32;
const SWORD_WIDTH = 6;

function checkSwordHit(attacker, target, angle){
  // sword tip position
  const tipX = attacker.x + Math.cos(angle)*(attacker.r + SWORD_LEN);
  const tipY = attacker.y + Math.sin(angle)*(attacker.r + SWORD_LEN);
  const dx = tipX - target.x, dy = tipY - target.y;
  const dist = Math.sqrt(dx*dx+dy*dy);
  if(dist < target.r + SWORD_WIDTH){
    // push away from attacker
    const nx = (target.x-attacker.x), ny = (target.y-attacker.y);
    const nd = Math.sqrt(nx*nx+ny*ny)||1;
    target.pushVx += (nx/nd)*300;
    target.pushVy += (ny/nd)*300;
  }
}

function shootArrow(from, to, owner){
  const dx=to.x-from.x, dy=to.y-from.y;
  const d=Math.sqrt(dx*dx+dy*dy)||1;
  const spd=320;
  arrows.push({
    x: from.x+(dx/d)*(from.r+8),
    y: from.y+(dy/d)*(from.r+8),
    vx:(dx/d)*spd, vy:(dy/d)*spd,
    owner, life:4
  });
}

function checkOut(b){
  // falling off edges (outside hard wall — shouldn't happen with bounce, but just in case)
  if(b.x < 0||b.x > W||b.y < 0||b.y > H){
    b.alive = false;
    endGame(b === player ? 'lose' : 'win');
  }
}

// ── DRAW ──
function drawArena(ctx, dt){
  // background
  ctx.fillStyle = '#0d0d15';
  ctx.fillRect(0,0,W,H);

  // grid
  ctx.strokeStyle = 'rgba(40,40,70,.5)';
  ctx.lineWidth = 1;
  for(let x=0;x<=W;x+=40){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=0;y<=H;y+=40){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // arena border
  ctx.strokeStyle = '#2a2a4a';
  ctx.lineWidth = 3;
  ctx.strokeRect(ARENA_PAD, ARENA_PAD, W-2*ARENA_PAD, H-2*ARENA_PAD);

  // corner decorations
  const corners = [[ARENA_PAD,ARENA_PAD],[W-ARENA_PAD,ARENA_PAD],[ARENA_PAD,H-ARENA_PAD],[W-ARENA_PAD,H-ARENA_PAD]];
  ctx.strokeStyle = '#c9a227';
  ctx.lineWidth = 2;
  corners.forEach(([cx,cy])=>{
    const s=16;
    ctx.strokeRect(cx-s/2,cy-s/2,s,s);
  });

  // arrows
  arrows.forEach(a=>{
    const ang = Math.atan2(a.vy,a.vx);
    ctx.save();
    ctx.translate(a.x,a.y);
    ctx.rotate(ang);
    ctx.strokeStyle = a.owner==='player' ? '#4cc9f0' : '#e63946';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(-14,0); ctx.lineTo(10,0); ctx.stroke();
    // arrowhead
    ctx.fillStyle = a.owner==='player' ? '#4cc9f0' : '#e63946';
    ctx.beginPath(); ctx.moveTo(10,0); ctx.lineTo(2,-5); ctx.lineTo(2,5); ctx.closePath(); ctx.fill();
    ctx.restore();
  });

  // draw balls
  drawBall(ctx, player, swordAngle.player);
  drawBall(ctx, enemy,  swordAngle.enemy);
}

function drawBall(ctx, b, sAngle){
  if(!b.alive) return;

  // glow
  const grd = ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*2.5);
  grd.addColorStop(0, b.color+'44');
  grd.addColorStop(1, 'transparent');
  ctx.beginPath(); ctx.arc(b.x,b.y,b.r*2.5,0,Math.PI*2);
  ctx.fillStyle=grd; ctx.fill();

  // body
  const bGrd = ctx.createRadialGradient(b.x-5,b.y-5,2,b.x,b.y,b.r);
  bGrd.addColorStop(0,'#fff');
  bGrd.addColorStop(.3, b.color);
  bGrd.addColorStop(1, b.color+'88');
  ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
  ctx.fillStyle=bGrd; ctx.fill();
  ctx.strokeStyle=b.color; ctx.lineWidth=2; ctx.stroke();

  // weapon
  if(b.weapon==='sword'){
    drawSword(ctx, b, sAngle);
  } else {
    drawBowIndicator(ctx, b);
  }
}

function drawSword(ctx, b, angle){
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(angle);

  // handle
  ctx.strokeStyle = '#8B6914';
  ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(b.r+6,0); ctx.stroke();

  // guard
  ctx.strokeStyle = '#c9a227';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(b.r+6,-8); ctx.lineTo(b.r+6,8); ctx.stroke();

  // blade
  const grad = ctx.createLinearGradient(b.r+6,0,b.r+SWORD_LEN,0);
  grad.addColorStop(0,'#e8e8ff');
  grad.addColorStop(.5,'#c0c8ff');
  grad.addColorStop(1,'rgba(192,200,255,0)');
  ctx.strokeStyle=grad; ctx.lineWidth=SWORD_WIDTH;
  ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(b.r+6,0); ctx.lineTo(b.r+SWORD_LEN,0); ctx.stroke();

  // shine
  ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(b.r+8,-2); ctx.lineTo(b.r+SWORD_LEN-4,-1); ctx.stroke();

  ctx.restore();
}

function drawBowIndicator(ctx, b){
  // small bow icon above ball
  ctx.save();
  ctx.translate(b.x, b.y - b.r - 12);
  ctx.strokeStyle = '#c9a227';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0,0,8, -Math.PI*0.6, Math.PI*0.6);
  ctx.stroke();
  // string
  ctx.strokeStyle = '#e8e8c0';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, -6.8); ctx.lineTo(0, 6.8);
  ctx.stroke();
  ctx.restore();
}

// ── END GAME ──
function endGame(result){
  if(!gameRunning) return;
  gameRunning = false;
  cancelAnimationFrame(animFrame);

  setTimeout(()=>{
    const t = document.getElementById('result-title');
    const s = document.getElementById('result-sub');
    if(result==='win'){
      t.textContent='ZWYCIĘSTWO!'; t.className='result-title win';
      s.textContent='Wróg pokonany • Świetna walka!';
    } else if(result==='lose'){
      t.textContent='PORAŻKA'; t.className='result-title lose';
      s.textContent='Spróbuj jeszcze raz…';
    } else {
      t.textContent='REMIS'; t.className='result-title draw';
      s.textContent='Oboje polegli jednocześnie';
    }
    showScreen('result-screen');
  }, 800);
}

function rematch(){
  document.getElementById('countdown-overlay').style.display='flex';
  document.getElementById('countdown-num').classList.remove('show');
  showScreen('arena-screen');
  initBalls();
  drawStatic();
  setTimeout(()=>runCountdown(3), 200);
}

function goMenu(){
  showScreen('menu-screen');
  playerWeapon = null;
  document.querySelectorAll('.weapon-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('btn-fight').classList.remove('visible');
}
