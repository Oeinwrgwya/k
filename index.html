<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ball Battle</title>
<style>
  :root {
    --bg: #0e0e14; --panel: #16161f; --border: #2c2c40;
    --gold: #c9a227; --red: #e63946; --blue: #4cc9f0;
    --text: #ddddf0; --dim: #606078;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .screen {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .25s;
  }
  .screen.hidden { opacity:0; pointer-events:none; }

  /* MENU */
  #menu-screen { flex-direction: column; gap: 28px; }
  .pick-label { text-align:center; font-size:13px; letter-spacing:3px; color:var(--dim); text-transform:uppercase; }
  .weapon-grid { display:flex; gap:20px; justify-content:center; }
  .weapon-card {
    width:120px; background:var(--panel); border:2px solid var(--border);
    border-radius:10px; padding:22px 14px 18px; cursor:pointer;
    text-align:center; transition:border-color .15s,background .15s;
    position:relative; user-select:none;
  }
  .weapon-card:hover { border-color:#555570; }
  .weapon-card.selected { border-color:var(--gold); background:#1b1708; }
  .weapon-icon { font-size:40px; display:block; margin-bottom:8px; }
  .weapon-name { font-size:13px; color:var(--dim); letter-spacing:1px; }
  .weapon-card.selected .weapon-name { color:var(--gold); }
  .weapon-badge {
    position:absolute; top:7px; right:7px; width:18px; height:18px;
    background:var(--gold); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:10px; color:#000; font-weight:700; opacity:0; transition:opacity .15s;
  }
  .weapon-card.selected .weapon-badge { opacity:1; }
  .btn-fight {
    font-size:14px; letter-spacing:3px; padding:12px 52px;
    background:var(--gold); border:none; border-radius:7px;
    color:#1a0f00; cursor:pointer; font-weight:600;
    transition:opacity .2s,transform .15s; opacity:0; pointer-events:none; text-transform:uppercase;
  }
  .btn-fight.visible { opacity:1; pointer-events:all; }
  .btn-fight:hover { transform:scale(1.04); }

  /* ARENA */
  #arena-screen { flex-direction:column; gap:0; align-items:center; }
  #arena-canvas { display:block; }
  .hp-row { width:900px; display:flex; justify-content:space-between; align-items:center; padding:8px 4px 6px; }
  .hp-block { display:flex; flex-direction:column; gap:4px; }
  .hp-block.right { align-items:flex-end; }
  .hp-label { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--dim); }
  .hp-bar-wrap { width:180px; height:8px; background:#1a1a28; border-radius:4px; overflow:hidden; border:1px solid var(--border); }
  .hp-bar { height:100%; border-radius:4px; transition:width .08s; }
  #hp-bar-player { background:var(--blue); }
  #hp-bar-enemy  { background:var(--red); }

  /* UPGRADE SCREEN */
  #upgrade-screen { flex-direction:column; gap:24px; align-items:center; }
  .upgrade-title { font-size:28px; font-weight:700; letter-spacing:3px; color:var(--gold); text-transform:uppercase; text-align:center; }
  .upgrade-sub { font-size:12px; color:var(--dim); letter-spacing:2px; text-transform:uppercase; }
  .upgrade-grid { display:flex; gap:24px; justify-content:center; }
  .upgrade-card {
    width:200px; background:var(--panel); border:2px solid var(--border);
    border-radius:12px; padding:24px 16px 20px; cursor:pointer;
    text-align:center; transition:border-color .15s,background .15s,transform .15s;
    position:relative; user-select:none;
  }
  .upgrade-card:hover { border-color:#555570; transform:translateY(-2px); }
  .upgrade-card.selected { border-color:var(--gold); background:#1b1708; }
  .upgrade-icon { font-size:48px; display:block; margin-bottom:12px; }
  .upgrade-name { font-size:14px; font-weight:600; color:var(--text); margin-bottom:6px; letter-spacing:1px; }
  .upgrade-card.selected .upgrade-name { color:var(--gold); }
  .upgrade-desc { font-size:11px; color:var(--dim); line-height:1.5; }
  .upgrade-badge {
    position:absolute; top:8px; right:8px; width:20px; height:20px;
    background:var(--gold); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:11px; color:#000; font-weight:700; opacity:0; transition:opacity .15s;
  }
  .upgrade-card.selected .upgrade-badge { opacity:1; }
  .btn-upgrade {
    font-size:14px; letter-spacing:3px; padding:12px 52px;
    background:var(--gold); border:none; border-radius:7px;
    color:#1a0f00; cursor:pointer; font-weight:600;
    transition:opacity .2s,transform .15s; opacity:0; pointer-events:none; text-transform:uppercase;
  }
  .btn-upgrade.visible { opacity:1; pointer-events:all; }
  .btn-upgrade:hover { transform:scale(1.04); }

  /* stat pills */
  .upgrade-stats { display:flex; flex-wrap:wrap; gap:5px; justify-content:center; margin-top:8px; }
  .stat-pill {
    font-size:10px; padding:2px 8px; border-radius:20px;
    letter-spacing:.5px; font-weight:600;
  }
  .stat-good { background:rgba(76,201,240,.15); color:#4cc9f0; border:1px solid rgba(76,201,240,.3); }
  .stat-bad  { background:rgba(230,57,70,.15);  color:#e63946; border:1px solid rgba(230,57,70,.3); }

  /* RESULT */
  #result-screen { flex-direction:column; gap:20px; align-items:center; }
  .result-title { font-size:clamp(28px,5vw,52px); font-weight:700; letter-spacing:3px; text-align:center; }
  .result-title.win  { color:var(--gold); }
  .result-title.lose { color:var(--red); }
  .result-title.draw { color:var(--blue); }
  .result-sub { color:var(--dim); font-size:13px; letter-spacing:2px; text-transform:uppercase; }
  .btn-rematch {
    font-size:13px; letter-spacing:2px; padding:11px 44px;
    background:transparent; border:2px solid var(--gold); border-radius:7px;
    color:var(--gold); cursor:pointer; transition:background .15s; text-transform:uppercase;
  }
  .btn-rematch:hover { background:rgba(201,162,39,.1); }
  .btn-menu {
    font-size:12px; letter-spacing:1px; padding:8px 32px;
    background:transparent; border:1px solid var(--border); border-radius:6px;
    color:var(--dim); cursor:pointer; transition:border-color .15s,color .15s;
  }
  .btn-menu:hover { border-color:var(--dim); color:var(--text); }
</style>
</head>
<body>

<!-- MENU -->
<div class="screen" id="menu-screen">
  <div class="pick-label">Choose your weapon</div>
  <div class="weapon-grid">
    <div class="weapon-card" id="card-sword" onclick="selectWeapon('sword')">
      <div class="weapon-badge">✓</div>
      <span class="weapon-icon">⚔️</span>
      <div class="weapon-name">Sword</div>
    </div>
    <div class="weapon-card" id="card-bow" onclick="selectWeapon('bow')">
      <div class="weapon-badge">✓</div>
      <span class="weapon-icon">🏹</span>
      <div class="weapon-name">Bow</div>
    </div>
    <div class="weapon-card" id="card-shield" onclick="selectWeapon('shield')">
      <div class="weapon-badge">✓</div>
      <span class="weapon-icon">🛡️</span>
      <div class="weapon-name">Shield</div>
    </div>
  </div>
  <button class="btn-fight" id="btn-fight" onclick="startGame()">Fight</button>
</div>

<!-- ARENA -->
<div class="screen hidden" id="arena-screen">
  <div class="hp-row">
    <div class="hp-block">
      <div class="hp-label">You</div>
      <div class="hp-bar-wrap"><div class="hp-bar" id="hp-bar-player" style="width:100%"></div></div>
    </div>
    <div class="hp-block right">
      <div class="hp-label">Enemy</div>
      <div class="hp-bar-wrap"><div class="hp-bar" id="hp-bar-enemy" style="width:100%"></div></div>
    </div>
  </div>
  <div style="position:relative; line-height:0;">
    <canvas id="arena-canvas" width="900" height="600"></canvas>
    <canvas id="sword-canvas" width="900" height="600" style="position:absolute;top:0;left:0;pointer-events:none;"></canvas>
  </div>
</div>

<!-- UPGRADE -->
<div class="screen hidden" id="upgrade-screen">
  <div class="upgrade-title">Upgrade Your Weapon</div>
  <div class="upgrade-sub">Choose your path</div>
  <div class="upgrade-grid" id="upgrade-grid"></div>
  <button class="btn-upgrade" id="btn-upgrade" onclick="applyUpgrade()">Upgrade & Fight</button>
</div>

<!-- RESULT -->
<div class="screen hidden" id="result-screen">
  <div class="result-title" id="result-title">Victory!</div>
  <div class="result-sub" id="result-sub">Enemy defeated</div>
  <button class="btn-rematch" onclick="rematch()">Rematch</button>
  <button class="btn-menu" onclick="goMenu()">Main Menu</button>
</div>

<script>
const W=900, H=600, R=22;
const MAX_HP_SWORD=10;
const MAX_HP_BOW=8;
const MAX_HP_SHIELD=16;
const SHIELD_CYCLE=4.0;   // seconds between blocks
const SHIELD_DURATION=4.0; // seconds block lasts
const SWORD_LEN=68;
const SWORD_W=5;
const ARROW_INTERVAL=1.8;
const WALL_BOUNCE=0.95;
const PUSH_SCALE=280;
const SWORD_ATTACK_DIST = SWORD_LEN + R + R + 10;

let playerWeapon=null, enemyWeapon=null;
let playerUpgrade=null; // 'curved' | 'wide' | 'wide_bow' | 'dark_bow'
let roundCount=0;
let selectedUpgradeId=null;
let gameRunning=false, animFrame=null, lastTime=0, gameEnded=false;
let player, enemy, arrows, arrowTimers, lastHit;

// ── upgrade definitions ──
const UPGRADES = {
  sword: [
    {
      id:'curved',
      name:'Curved Blade',
      icon:'🗡️',
      desc:'A crescent blade — dashes are much more powerful, allowing aggressive lunges across the arena.',
      stats:[{t:'Dash +80%',g:true},{t:'Damage normal',g:true}],
      dashMult:1.8, damageMult:1, swordLen:68
    },
    {
      id:'wide',
      name:'Broad Sword',
      icon:'⚔️',
      desc:'A heavy, wide blade — each hit deals double damage, but the added weight slightly slows your dashes.',
      stats:[{t:'Damage ×2',g:true},{t:'Dash -25%',g:false}],
      dashMult:0.75, damageMult:2, swordLen:80
    }
  ],
  bow: [
    {
      id:'wide_bow',
      name:'Wide Bow',
      icon:'🏹',
      desc:'A broader limb gives explosive draw speed — fires twice as fast, no spread shot.',
      stats:[{t:'Fire rate ×2',g:true},{t:'No triple shot',g:false}],
      fireRateMult:2, tripleShot:false, spreadAngles:[]
    },
    {
      id:'dark_bow',
      name:'Dark Bow',
      icon:'🪃',
      desc:'An ancient dark bow — fires 4 side arrows in a tight fan around the main shot.',
      stats:[{t:'5 arrows per salvo',g:true},{t:'Fire rate normal',g:true}],
      fireRateMult:1, tripleShot:true, spreadAngles:[-0.42,-0.21,0.21,0.42]
    }
  ],
  shield: [
    {
      id:'dark_shield',
      name:'Dark Shield',
      icon:'🌑',
      desc:'A dark barrier surrounds the ball — creates a force field slightly further out that blocks all attacks and projectiles.',
      stats:[{t:'360° block field',g:true},{t:'Longer cooldown',g:false}],
    },
    {
      id:'spike_shield',
      name:'Spike Shield',
      icon:'⚙️',
      desc:'Spikes on the shield deal 1 damage on contact, and reflected sword hits deal +1 extra damage.',
      stats:[{t:'Contact damage',g:true},{t:'Reflect +1 dmg',g:true}],
    }
  ]
};

function selectWeapon(w){
  playerWeapon=w;
  document.querySelectorAll('.weapon-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('card-'+w).classList.add('selected');
  document.getElementById('btn-fight').classList.add('visible');
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function makeSword(){
  return {
    state:'rest', angle:0, restAngle:0, slashAngle:0,
    timer:0, hitDealt:false,
    slashDur:0.13, recoverDur:0.25, cooldown:0,
    dashTimer:1.0+Math.random(),
  };
}

function getMaxHP(weapon){ return weapon==='bow'?MAX_HP_BOW:weapon==='shield'?MAX_HP_SHIELD:MAX_HP_SWORD; }

function initBalls(){
  gameEnded=false;
  if(playerWeapon==='sword') enemyWeapon=['bow','shield'][Math.floor(Math.random()*2)];
  else if(playerWeapon==='bow') enemyWeapon=['sword','shield'][Math.floor(Math.random()*2)];
  else { enemyWeapon=['sword','bow'][Math.floor(Math.random()*2)]; }
  const spd=150;
  function rv(){ const a=Math.random()*Math.PI*2; return {vx:Math.cos(a)*spd,vy:Math.sin(a)*spd}; }
  const pv=rv(), ev=rv();
  player={ x:130, y:H/2, vx:pv.vx, vy:pv.vy, r:R, weapon:playerWeapon, color:'#4cc9f0', alive:true, hp:getMaxHP(playerWeapon), aimAngle:0, sword:makeSword(), shield:{timer:0,blocking:false,blockTimer:0} };
  enemy ={ x:W-130, y:H/2, vx:ev.vx, vy:ev.vy, r:R, weapon:enemyWeapon,  color:'#e63946', alive:true, hp:getMaxHP(enemyWeapon), aimAngle:Math.PI, sword:makeSword(), shield:{timer:0,blocking:false,blockTimer:0} };
  arrows=[];
  arrowTimers={player:0,enemy:0,playerShot:0,enemyShot:0};
  lastHit={player:-999,enemy:-999};
  updateHPBars();
}

function updateHPBars(){
  document.getElementById('hp-bar-player').style.width=(player.hp/getMaxHP(playerWeapon)*100)+'%';
  document.getElementById('hp-bar-enemy').style.width=(enemy.hp/getMaxHP(enemyWeapon)*100)+'%';
}

function startGame(){
  showScreen('arena-screen');
  initBalls();
  gameRunning=true; lastTime=performance.now();
  animFrame=requestAnimationFrame(loop);
}

function loop(ts){
  if(!gameRunning) return;
  const dt=Math.min((ts-lastTime)/1000,.05);
  lastTime=ts;
  update(dt);
  draw();
  animFrame=requestAnimationFrame(loop);
}

function angleDiff(a,b){ let d=((b-a+Math.PI*3)%(Math.PI*2))-Math.PI; return d; }
function lerpAngle(a,b,t){ return a+angleDiff(a,b)*t; }

function update(dt){
  moveBall(player,dt);
  moveBall(enemy,dt);
  ballCollide(player,enemy);

  if(player.weapon==='sword') updateSword(player,enemy,dt,true);
  if(enemy.weapon==='sword')  updateSword(enemy,player,dt,false);

  // shield logic
  if(player.weapon==='shield') updateShield(player,dt);
  if(enemy.weapon==='shield')  updateShield(enemy,dt);

  if(player.weapon==='bow') player.aimAngle=Math.atan2(enemy.y-player.y,enemy.x-player.x);
  if(enemy.weapon==='bow')  enemy.aimAngle =Math.atan2(player.y-enemy.y,player.x-enemy.x);

  // bow shooting — player
  if(player.weapon==='bow'){
    const upg = playerUpgrade ? UPGRADES.bow.find(u=>u.id===playerUpgrade) : null;
    const interval = upg ? ARROW_INTERVAL/(upg.fireRateMult||1) : ARROW_INTERVAL;
    arrowTimers.player+=dt;
    if(arrowTimers.player>=interval){
      arrowTimers.player=0;
      arrowTimers.playerShot=(arrowTimers.playerShot||0)+1;
      const doTriple = upg ? upg.tripleShot : true;
      if(doTriple && arrowTimers.playerShot>=3){
        arrowTimers.playerShot=0;
        shootTriple(player,enemy,'player', upg ? upg.spreadAngles : [-0.28,0.28]);
      } else {
        shootArrow(player,enemy,'player');
      }
    }
  }

  // bow shooting — enemy
  if(enemy.weapon==='bow'){
    arrowTimers.enemy+=dt;
    if(arrowTimers.enemy>=ARROW_INTERVAL){
      arrowTimers.enemy=0;
      arrowTimers.enemyShot=(arrowTimers.enemyShot||0)+1;
      if(arrowTimers.enemyShot>=3){
        arrowTimers.enemyShot=0;
        shootTriple(enemy,player,'enemy',[-0.28,0.28]);
      } else {
        shootArrow(enemy,player,'enemy');
      }
    }
  }

  for(let i=arrows.length-1;i>=0;i--){
    const a=arrows[i];
    a.x+=a.vx*dt; a.y+=a.vy*dt; a.life-=dt;
    if(a.x<0||a.x>W||a.y<0||a.y>H||a.life<=0){arrows.splice(i,1);continue;}
    const tgt=a.owner==='player'?enemy:player;
    if(!tgt.alive) continue;
    const dx=a.x-tgt.x,dy=a.y-tgt.y;
    // shield collision — check against shield ) position first
    if(tgt.weapon==='shield' && tgt.shield && tgt.shield.blocking){
      const isPlayerShield=tgt===player;
      const upgS=(isPlayerShield&&playerUpgrade)?UPGRADES.shield.find(u=>u.id===playerUpgrade):null;
      const isDark=upgS&&upgS.id==='dark_shield';
      let hit=false;
      if(isDark){
        // full field around ball
        const fdx=a.x-tgt.x, fdy=a.y-tgt.y;
        if(Math.sqrt(fdx*fdx+fdy*fdy)<tgt.r+32) hit=true;
      } else {
        const toEnemyA=tgt===player?Math.atan2(enemy.y-tgt.y,enemy.x-tgt.x):Math.atan2(player.y-tgt.y,player.x-tgt.x);
        const sx=tgt.x+Math.cos(toEnemyA)*(tgt.r+10);
        const sy=tgt.y+Math.sin(toEnemyA)*(tgt.r+10);
        const sdx=a.x-sx, sdy=a.y-sy;
        if(Math.sqrt(sdx*sdx+sdy*sdy)<38) hit=true;
      }
      if(hit){
        const spd2=Math.sqrt(a.vx*a.vx+a.vy*a.vy);
        const shooter2=a.owner==='player'?player:enemy;
        const dx2=shooter2.x-tgt.x, dy2=shooter2.y-tgt.y;
        const d2=Math.sqrt(dx2*dx2+dy2*dy2)||1;
        a.vx=(dx2/d2)*spd2; a.vy=(dy2/d2)*spd2;
        a.owner=a.owner==='player'?'enemy':'player';
        a.life=5;
        continue;
      }
    }
    if(Math.sqrt(dx*dx+dy*dy)<tgt.r+4){
      const sp=Math.sqrt(a.vx*a.vx+a.vy*a.vy);
      tgt.vx=(a.vx/sp)*PUSH_SCALE; tgt.vy=(a.vy/sp)*PUSH_SCALE;
      arrows.splice(i,1);
      damage(tgt, 1);
    }
  }
}

function moveBall(b,dt){
  b.x+=b.vx*dt; b.y+=b.vy*dt;
  if(b.x<b.r)   { b.x=b.r;   b.vx= Math.abs(b.vx)*WALL_BOUNCE; }
  if(b.x>W-b.r) { b.x=W-b.r; b.vx=-Math.abs(b.vx)*WALL_BOUNCE; }
  if(b.y<b.r)   { b.y=b.r;   b.vy= Math.abs(b.vy)*WALL_BOUNCE; }
  if(b.y>H-b.r) { b.y=H-b.r; b.vy=-Math.abs(b.vy)*WALL_BOUNCE; }
}

function ballCollide(a,b){
  const dx=b.x-a.x, dy=b.y-a.y;
  const dist=Math.sqrt(dx*dx+dy*dy);
  const minDist=a.r+b.r;
  if(dist>=minDist||dist===0) return;
  const nx=dx/dist, ny=dy/dist;
  const overlap=(minDist-dist)/2;
  a.x-=nx*overlap; a.y-=ny*overlap;
  b.x+=nx*overlap; b.y+=ny*overlap;
  const dvx=a.vx-b.vx, dvy=a.vy-b.vy;
  const dot=dvx*nx+dvy*ny;
  if(dot<=0) return;
  a.vx-=dot*nx; a.vy-=dot*ny;
  b.vx+=dot*nx; b.vy+=dot*ny;
}

function updateSword(att, tgt, dt, isPlayer){
  const sw=att.sword;
  const upg = (isPlayer && playerUpgrade) ? UPGRADES.sword.find(u=>u.id===playerUpgrade) : null;
  const dashMult = upg ? upg.dashMult : 1;
  const swordLen = upg ? upg.swordLen : SWORD_LEN;

  const toEnemyAngle=Math.atan2(tgt.y-att.y,tgt.x-att.x);
  const restAngle=toEnemyAngle+Math.PI+0.8;
  sw.restAngle=restAngle;
  const dist=Math.sqrt((tgt.x-att.x)**2+(tgt.y-att.y)**2);
  sw.cooldown=Math.max(0,sw.cooldown-dt);

  if(sw.state==='rest'){
    sw.angle=lerpAngle(sw.angle,restAngle,Math.min(1,dt*8));
    sw.dashTimer=Math.max(0,sw.dashTimer-dt);
    if(sw.dashTimer<=0){
      sw.dashTimer=2.0;
      const nx=(tgt.x-att.x), ny=(tgt.y-att.y);
      const nd=Math.sqrt(nx*nx+ny*ny)||1;
      att.vx+=(nx/nd)*160*dashMult;
      att.vy+=(ny/nd)*160*dashMult;
    }
    if(dist<(swordLen+R+R+10) && sw.cooldown<=0){
      sw.state='slash'; sw.timer=0; sw.hitDealt=false;
      sw.slashAngle=toEnemyAngle;
    }
  } else if(sw.state==='slash'){
    sw.timer+=dt;
    const p=Math.min(1,sw.timer/sw.slashDur);
    sw.angle=lerpAngle(restAngle,sw.slashAngle,easeOut(p));
    if(!sw.hitDealt) checkSwordBlade(att,tgt,sw.angle,sw,isPlayer,swordLen);
    if(sw.timer>=sw.slashDur){ sw.state='recover'; sw.timer=0; }
  } else if(sw.state==='recover'){
    sw.timer+=dt;
    const p=Math.min(1,sw.timer/sw.recoverDur);
    sw.angle=lerpAngle(sw.slashAngle,restAngle,easeOut(p));
    if(sw.timer>=sw.recoverDur){ sw.state='rest'; sw.cooldown=0.4; }
  }
}

function easeOut(t){ return 1-(1-t)*(1-t); }

function updateShield(b, dt){
  const sh=b.shield;
  const isPlayer=b===player;
  const upg=(isPlayer&&playerUpgrade)?UPGRADES.shield.find(u=>u.id===playerUpgrade):null;
  const cycle = upg&&upg.id==='dark_shield' ? SHIELD_CYCLE+2 : SHIELD_CYCLE;
  if(sh.blocking){
    sh.blockTimer-=dt;
    if(sh.blockTimer<=0){ sh.blocking=false; sh.timer=0; }
  } else {
    sh.timer+=dt;
    if(sh.timer>=cycle){ sh.blocking=true; sh.blockTimer=SHIELD_DURATION; sh.timer=0; }
  }
  // spike shield: deal contact damage to enemy on collision
  if(upg&&upg.id==='spike_shield'){
    const tgt=b===player?enemy:player;
    const dx=tgt.x-b.x, dy=tgt.y-b.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<b.r+tgt.r+8){ damage(tgt,1); }
  }
}

function checkSwordBlade(att,tgt,angle,sw,isPlayer,swordLen){
  const len = swordLen || SWORD_LEN;
  const s0=att.r, s1=att.r+len;
  const upg = (isPlayer && playerUpgrade) ? UPGRADES.sword.find(u=>u.id===playerUpgrade) : null;
  const dmg = upg ? upg.damageMult : 1;
  // if target is blocking with shield, negate damage and push attacker back
  if(tgt.shield && tgt.shield.blocking){
    const isPlayerShield=tgt===player;
    const upgS2=(isPlayerShield&&playerUpgrade)?UPGRADES.shield.find(u=>u.id===playerUpgrade):null;
    const isDark2=upgS2&&upgS2.id==='dark_shield';
    const isSpike=upgS2&&upgS2.id==='spike_shield';
    const blockR = isDark2 ? tgt.r+32 : tgt.r+SWORD_W/2;
    for(let t=0;t<=1;t+=0.1){
      const d=s0+(s1-s0)*t;
      const bx=att.x+Math.cos(angle)*d, by=att.y+Math.sin(angle)*d;
      const dx=bx-tgt.x, dy=by-tgt.y;
      if(Math.sqrt(dx*dx+dy*dy)<blockR){
        const nx=(att.x-tgt.x), ny=(att.y-tgt.y);
        const nd=Math.sqrt(nx*nx+ny*ny)||1;
        att.vx=(nx/nd)*PUSH_SCALE*1.4; att.vy=(ny/nd)*PUSH_SCALE*1.4;
        const reflectDmg = isSpike ? dmg+1 : dmg;
        damage(att, reflectDmg);
        sw.hitDealt=true;
        break;
      }
    }
    return;
  }
  for(let t=0;t<=1;t+=0.1){
    const d=s0+(s1-s0)*t;
    const bx=att.x+Math.cos(angle)*d, by=att.y+Math.sin(angle)*d;
    const dx=bx-tgt.x, dy=by-tgt.y;
    if(Math.sqrt(dx*dx+dy*dy)<tgt.r+SWORD_W/2){
      const nx=(tgt.x-att.x), ny=(tgt.y-att.y);
      const nd=Math.sqrt(nx*nx+ny*ny)||1;
      tgt.vx=(nx/nd)*PUSH_SCALE; tgt.vy=(ny/nd)*PUSH_SCALE;
      damage(tgt, dmg);
      sw.hitDealt=true;
      break;
    }
  }
}

function damage(b, amt=1){
  const key=b===player?'player':'enemy';
  const now=performance.now();
  if(now-lastHit[key]<450) return;
  lastHit[key]=now;
  b.hp=Math.max(0,b.hp-amt);
  updateHPBars();
  if(b.hp<=0){ b.alive=false; endGame(b===player?'lose':'win'); }
}

function shootArrow(from,to,owner){
  const dx=to.x-from.x,dy=to.y-from.y;
  const d=Math.sqrt(dx*dx+dy*dy)||1;
  const spd=320;
  arrows.push({x:from.x+(dx/d)*(from.r+10),y:from.y+(dy/d)*(from.r+10),vx:(dx/d)*spd,vy:(dy/d)*spd,owner,life:5});
}

function shootTriple(from,to,owner,spreadAngles){
  const dx=to.x-from.x,dy=to.y-from.y;
  const spd=320;
  const baseAng=Math.atan2(dy,dx);
  // always shoot center arrow
  arrows.push({x:from.x+Math.cos(baseAng)*(from.r+10),y:from.y+Math.sin(baseAng)*(from.r+10),vx:Math.cos(baseAng)*spd,vy:Math.sin(baseAng)*spd,owner,life:5});
  // side arrows from spread
  (spreadAngles||[-0.28,0.28]).forEach(offset=>{
    const ang=baseAng+offset;
    arrows.push({x:from.x+Math.cos(ang)*(from.r+10),y:from.y+Math.sin(ang)*(from.r+10),vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,owner,life:5});
  });
}

// ── DRAW ──
function draw(){
  const cv=document.getElementById('arena-canvas');
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#0d0d16'; ctx.fillRect(0,0,W,H);

  ctx.strokeStyle='rgba(36,36,62,.8)'; ctx.lineWidth=1;
  for(let x=0;x<=W;x+=40){ ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke(); }
  for(let y=0;y<=H;y+=40){ ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke(); }
  ctx.strokeStyle='rgba(55,55,90,.9)'; ctx.lineWidth=2;
  ctx.strokeRect(1,1,W-2,H-2);

  arrows.forEach(a=>{
    const ang=Math.atan2(a.vy,a.vx);
    ctx.save(); ctx.translate(a.x,a.y); ctx.rotate(ang);
    const col=a.owner==='player'?'#4cc9f0':'#e63946';
    ctx.strokeStyle=col; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(-12,0); ctx.lineTo(8,0); ctx.stroke();
    ctx.fillStyle=col;
    ctx.beginPath(); ctx.moveTo(8,0); ctx.lineTo(1,-4); ctx.lineTo(1,4); ctx.closePath(); ctx.fill();
    ctx.restore();
  });

  drawBallBody(ctx,player);
  drawBallBody(ctx,enemy);
  if(player.weapon==='bow') drawBow(ctx,player);
  if(enemy.weapon==='bow')  drawBow(ctx,enemy);
  if(player.weapon==='shield') drawShield(ctx,player,true);
  if(enemy.weapon==='shield')  drawShield(ctx,enemy,false);

  const sc=document.getElementById('sword-canvas');
  const sctx=sc.getContext('2d');
  sctx.clearRect(0,0,W,H);
  if(player.weapon==='sword' && player.alive) drawSword(sctx,player,true);
  if(enemy.weapon==='sword'  && enemy.alive)  drawSword(sctx,enemy,false);
}

function drawBallBody(ctx,b){
  if(!b.alive) return;
  const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r*2.2);
  g.addColorStop(0,b.color+'2a'); g.addColorStop(1,'transparent');
  ctx.beginPath(); ctx.arc(b.x,b.y,b.r*2.2,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  const bg=ctx.createRadialGradient(b.x-4,b.y-4,1,b.x,b.y,b.r);
  bg.addColorStop(0,'#fff'); bg.addColorStop(.25,b.color); bg.addColorStop(1,b.color+'66');
  ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2);
  ctx.fillStyle=bg; ctx.fill();
  ctx.strokeStyle=b.color; ctx.lineWidth=2; ctx.stroke();
}

function drawSword(ctx,b,isPlayer){
  const sw=b.sword;
  const angle=sw.angle;
  const upg = (isPlayer && playerUpgrade) ? UPGRADES.sword.find(u=>u.id===playerUpgrade) : null;
  const swordLen = upg ? upg.swordLen : SWORD_LEN;
  const isCurved = upg && upg.id==='curved';
  const isWide   = upg && upg.id==='wide';

  ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(angle);
  const s=b.r+1;

  // handle
  ctx.strokeStyle='#7a5810'; ctx.lineWidth=5; ctx.lineCap='butt';
  ctx.beginPath(); ctx.moveTo(s,0); ctx.lineTo(s+10,0); ctx.stroke();

  // guard
  ctx.strokeStyle='#c9a227'; ctx.lineWidth=isWide?5:3;
  ctx.beginPath(); ctx.moveTo(s+10,isWide?-13:-9); ctx.lineTo(s+10,isWide?13:9); ctx.stroke();

  const bs=s+10, be=s+swordLen;

  if(isCurved){
    // draw curved blade as arc
    ctx.save();
    ctx.strokeStyle='#a0d8ff'; ctx.lineWidth=4; ctx.lineCap='round';
    ctx.beginPath();
    // simulate curve: draw quadratic bezier
    ctx.moveTo(bs,0);
    ctx.quadraticCurveTo(bs+(be-bs)*0.5, -14, be, -4);
    ctx.stroke();
    // shine
    ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(bs+4,0);
    ctx.quadraticCurveTo(bs+(be-bs)*0.5,-8,be-4,-3);
    ctx.stroke();
    ctx.restore();
  } else {
    // straight blade (normal or wide)
    const bladeW = isWide ? 9 : SWORD_W;
    const gr=ctx.createLinearGradient(bs,0,be,0);
    gr.addColorStop(0,'#e8e8ff'); gr.addColorStop(.5,isWide?'#d0a0ff':'#b8c0ff'); gr.addColorStop(1,'rgba(160,170,255,0)');
    ctx.strokeStyle=gr; ctx.lineWidth=bladeW; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(bs,0); ctx.lineTo(be,0); ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(bs+2,-2); ctx.lineTo(be-4,-1); ctx.stroke();
  }

  ctx.restore();
}

function drawShield(ctx,b,isPlayer){
  const sh=b.shield;
  const upg=(isPlayer&&playerUpgrade)?UPGRADES.shield.find(u=>u.id===playerUpgrade):null;
  const isDark=upg&&upg.id==='dark_shield';
  const isSpike=upg&&upg.id==='spike_shield';
  const blocking=sh.blocking;
  const cycle=isDark?SHIELD_CYCLE+2:SHIELD_CYCLE;

  const toEnemy= b===player
    ? Math.atan2(enemy.y-b.y, enemy.x-b.x)
    : Math.atan2(player.y-b.y, player.x-b.x);

  if(isDark){
    // dark shield: draw ) like normal but darker, PLUS yellow field circle
    ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(toEnemy);
    const x0d=b.r+10, hd=28, bulged=14;
    if(blocking){
      ctx.shadowColor='rgba(180,140,0,0.7)'; ctx.shadowBlur=10;
      ctx.strokeStyle='#7a6010'; ctx.lineWidth=5; ctx.lineCap='round';
    } else {
      const fd=sh.timer/cycle;
      ctx.globalAlpha=0.25+fd*0.35;
      ctx.strokeStyle='#4a3a08'; ctx.lineWidth=4; ctx.lineCap='round';
    }
    ctx.beginPath();
    ctx.moveTo(x0d,-hd);
    ctx.quadraticCurveTo(x0d+bulged,0,x0d,hd);
    ctx.stroke();
    ctx.shadowBlur=0; ctx.globalAlpha=1;
    ctx.restore();

    // yellow field circle
    const fieldR=b.r+40;
    if(blocking){
      const glow=ctx.createRadialGradient(b.x,b.y,b.r+20,b.x,b.y,fieldR+6);
      glow.addColorStop(0,'rgba(255,220,80,0.15)');
      glow.addColorStop(1,'rgba(255,180,0,0)');
      ctx.beginPath(); ctx.arc(b.x,b.y,fieldR+6,0,Math.PI*2);
      ctx.fillStyle=glow; ctx.fill();
      ctx.strokeStyle='rgba(255,210,60,0.8)'; ctx.lineWidth=2.5;
      ctx.beginPath(); ctx.arc(b.x,b.y,fieldR,0,Math.PI*2); ctx.stroke();
    } else {
      const frac=sh.timer/cycle;
      ctx.globalAlpha=0.12+frac*0.25;
      ctx.strokeStyle='#c9a227'; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.arc(b.x,b.y,fieldR,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=1;
    }
  } else {
    // normal ) or spike shield
    ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(toEnemy);
    const x0=b.r+10, h=28, bulge=14;

    if(blocking){
      ctx.shadowColor=isSpike?'rgba(255,80,80,0.9)':'rgba(255,220,80,0.9)';
      ctx.shadowBlur=18;
      ctx.strokeStyle=isSpike?'#ff6060':'#ffe066';
      ctx.lineWidth=5; ctx.lineCap='round';
    } else {
      const f=sh.timer/cycle;
      ctx.globalAlpha=0.3+f*0.5;
      ctx.strokeStyle=isSpike?'#882020':'#b08820';
      ctx.lineWidth=4; ctx.lineCap='round';
    }

    ctx.beginPath();
    ctx.moveTo(x0,-h);
    ctx.quadraticCurveTo(x0+bulge,0,x0,h);
    ctx.stroke();
    ctx.shadowBlur=0;

    // draw spikes on spike shield
    if(isSpike){
      ctx.strokeStyle=blocking?'#ff9090':'rgba(180,60,60,0.6)';
      ctx.lineWidth=2; ctx.lineCap='round';
      const spikeCount=5;
      for(let i=0;i<spikeCount;i++){
        const t=i/(spikeCount-1);
        const px=x0+bulge*Math.sin(Math.PI*t);
        const py=-h+h*2*t;
        const outx=px+8, outy=py;
        ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(outx,outy); ctx.stroke();
      }
    }

    ctx.globalAlpha=1;
    ctx.restore();
  }

  // cooldown arc around ball
  if(!blocking){
    const frac=sh.timer/cycle;
    ctx.save(); ctx.translate(b.x,b.y);
    ctx.strokeStyle=isDark?'rgba(160,60,255,0.5)':isSpike?'rgba(255,80,80,0.5)':'rgba(255,200,50,0.5)';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.arc(0,0,b.r+3,-Math.PI/2,-Math.PI/2+frac*Math.PI*2);
    ctx.stroke();
    ctx.restore();
  } else {
    const frac=sh.blockTimer/SHIELD_DURATION;
    ctx.save(); ctx.translate(b.x,b.y);
    ctx.strokeStyle=isDark?'rgba(180,80,255,0.9)':isSpike?'rgba(255,100,100,0.9)':'rgba(255,230,80,0.9)';
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.arc(0,0,b.r+3,-Math.PI/2,-Math.PI/2+frac*Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }
}

function drawBow(ctx,b){
  const isPlayer = b===player;
  const upg = (isPlayer && playerUpgrade) ? UPGRADES.bow.find(u=>u.id===playerUpgrade) : null;

  ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.aimAngle);
  const d=b.r+14;

  if(upg && upg.id==='wide_bow'){
    // wider bow — bigger arc
    ctx.strokeStyle='#e0c040'; ctx.lineWidth=3.5;
    ctx.beginPath(); ctx.arc(d,0,22,-Math.PI*.7,Math.PI*.7); ctx.stroke();
    const sy=Math.sin(Math.PI*.7)*22;
    ctx.strokeStyle='#ffffc0'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.moveTo(d,-sy); ctx.lineTo(d+6,0); ctx.lineTo(d,sy); ctx.stroke();
  } else if(upg && upg.id==='dark_bow'){
    // dark brown bow
    ctx.strokeStyle='#5c3010'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(d,0,16,-Math.PI*.65,Math.PI*.65); ctx.stroke();
    const sy=Math.sin(Math.PI*.65)*16;
    ctx.strokeStyle='#9c7040'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(d,-sy); ctx.lineTo(d+4,0); ctx.lineTo(d,sy); ctx.stroke();
  } else {
    // default bow
    ctx.strokeStyle='#c9a227'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(d,0,16,-Math.PI*.65,Math.PI*.65); ctx.stroke();
    const sy=Math.sin(Math.PI*.65)*16;
    ctx.strokeStyle='#e8e8c0'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(d,-sy); ctx.lineTo(d+4,0); ctx.lineTo(d,sy); ctx.stroke();
  }
  ctx.restore();
}

function endGame(result){
  if(!gameRunning||gameEnded) return;
  gameEnded=true; gameRunning=false; cancelAnimationFrame(animFrame); animFrame=null;
  setTimeout(()=>{
    roundCount++;
    if(roundCount===1){
      showUpgradeScreen(result);
    } else {
      showResult(result);
    }
  },500);
}

function showResult(result){
  const title = result==='win'?'Victory!':result==='lose'?'Defeat':'Draw';
  const sub   = result==='win'?'Enemy defeated':result==='lose'?'Try again':'Both fell';
  const cls   = result==='win'?'win':result==='lose'?'lose':'draw';
  // hide all screens
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  // build result screen content fresh
  const screen = document.getElementById('result-screen');
  if(!screen) return;
  screen.innerHTML = `
    <div class="result-title ${cls}">${title}</div>
    <div class="result-sub">${sub}</div>
    <button class="btn-rematch" onclick="rematch()">Rematch</button>
    <button class="btn-menu" onclick="goMenu()">Main Menu</button>
  `;
  screen.classList.remove('hidden');
}

// ── UPGRADE SCREEN ──
function showUpgradeScreen(pendingResult){
  const upgrades = UPGRADES[playerWeapon] || [];
  if(upgrades.length===0){
    showResult(pendingResult);
    return;
  }
  selectedUpgradeId=null;
  const subText = pendingResult==='win'?'You won — upgrade and fight again':pendingResult==='lose'?'You lost — pick your upgrade':'Choose your path';

  const cardsHtml = upgrades.map(upg=>{
    const stats=upg.stats.map(s=>`<span class="stat-pill ${s.g?'stat-good':'stat-bad'}">${s.t}</span>`).join('');
    return `<div class="upgrade-card" id="upg-${upg.id}" onclick="selectUpgrade('${upg.id}')">
      <div class="upgrade-badge">✓</div>
      <span class="upgrade-icon">${upg.icon}</span>
      <div class="upgrade-name">${upg.name}</div>
      <div class="upgrade-desc">${upg.desc}</div>
      <div class="upgrade-stats">${stats}</div>
    </div>`;
  }).join('');

  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  const screen = document.getElementById('upgrade-screen');
  screen.innerHTML = `
    <div class="upgrade-title">Upgrade Your Weapon</div>
    <div class="upgrade-sub">${subText}</div>
    <div class="upgrade-grid">${cardsHtml}</div>
    <button class="btn-upgrade visible" id="btn-upgrade-hidden" style="opacity:0;pointer-events:none" onclick="applyUpgrade()">Upgrade &amp; Fight</button>
  `;
  screen.classList.remove('hidden');
}

function selectUpgrade(id){
  selectedUpgradeId=id;
  document.querySelectorAll('.upgrade-card').forEach(c=>c.classList.remove('selected'));
  const card=document.getElementById('upg-'+id);
  if(card) card.classList.add('selected');
  const btn=document.getElementById('btn-upgrade-hidden');
  if(btn){ btn.style.opacity='1'; btn.style.pointerEvents='all'; }
}

function applyUpgrade(){
  if(!selectedUpgradeId) return;
  playerUpgrade=selectedUpgradeId;
  rematch();
}

function rematch(){
  showScreen('arena-screen');
  initBalls();
  gameRunning=true; lastTime=performance.now();
  animFrame=requestAnimationFrame(loop);
}

function goMenu(){
  showScreen('menu-screen');
  playerWeapon=null; playerUpgrade=null; roundCount=0;
  document.querySelectorAll('.weapon-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('btn-fight').classList.remove('visible');
}
</script>
